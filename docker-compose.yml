services:
  # 1. Servis: Veritabanı (PostgreSQL)
  db:
    image: postgres:15
    container_name: treffpunkt-db
    environment:
      POSTGRES_DB: treffpunkt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Servis: Senin Uygulaman (Backend)
  app:
    build: . # Olduğun yerdeki Dockerfile'ı kullan
    container_name: treffpunkt-app
    depends_on:
      - db # Önce veritabanı açılsın, sonra uygulama
    ports:
      - "8080:8080"
    environment:
      # ÖNEMLİ: localhost yerine "db" yazıyoruz, Docker bunları konuşturur.
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/treffpunkt
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  postgres_data: # Konteyner silinse bile verilerin kaybolmaması için