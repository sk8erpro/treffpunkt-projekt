services:
  db:
    image: postgres:15
    container_name: treffpunkt-db
    environment:
      POSTGRES_DB: treffpunkt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: senin_docker_kullanici_adin/treffpunkt-projekt:latest
    container_name: treffpunkt-app
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/treffpunkt
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password123

  # İŞTE O SİHİRLİ BEKÇİ (WATCHTOWER)
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 # Her 30 saniyede bir yeni imaj var mı diye bak